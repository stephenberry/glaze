name: gcc

on:
  push:
    branches:
      - main
      - feature/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]
        build_type: [Debug]
        std: [23]

    env:
      CC: gcc-${{matrix.gcc}}
      CXX: g++-${{matrix.gcc}}

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: |
        CXXFLAGS="-g3" cmake -S "$GITHUB_WORKSPACE" -B "$GITHUB_WORKSPACE/build" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_CXX_STANDARD=${{matrix.std}}

    - name: Build
      run: cmake --build "$GITHUB_WORKSPACE/build" -j $(nproc)

    - name: Test
      run: ctest --output-on-failure --test-dir "$GITHUB_WORKSPACE/build"

  build-gcc15:
    runs-on: ubuntu-24.04
    container:
      image: gcc:15

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]
        std: [23]

    env:
      CC: gcc
      CXX: g++

    steps:
    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates \
          cmake \
          git \
          libssl-dev \
          python3
        update-ca-certificates

    - uses: actions/checkout@v6

    - name: Prepare build directory
      run: cmake -E make_directory "$GITHUB_WORKSPACE/build"

    - name: Configure CMake
      run: |
        CXXFLAGS="-g3" cmake -S "$GITHUB_WORKSPACE" -B "$GITHUB_WORKSPACE/build" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_CXX_STANDARD=${{matrix.std}}

    - name: Build
      run: cmake --build "$GITHUB_WORKSPACE/build" -j $(nproc)

    - name: Test
      run: ctest --output-on-failure --test-dir "$GITHUB_WORKSPACE/build"

  build-gcc16:
    runs-on: ubuntu-24.04
    container:
      image: gcc:16.1

    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug]
        std: [23, 26]

    env:
      CC: gcc
      CXX: g++

    steps:
    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates \
          cmake \
          git \
          libssl-dev \
          python3
        update-ca-certificates

    - uses: actions/checkout@v6

    - name: Prepare build directory
      run: cmake -E make_directory "$GITHUB_WORKSPACE/build"

    - name: Configure CMake
      run: |
        CXXFLAGS="-g3" cmake -S "$GITHUB_WORKSPACE" -B "$GITHUB_WORKSPACE/build" -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -DCMAKE_CXX_STANDARD=${{matrix.std}}

    - name: Build
      run: cmake --build "$GITHUB_WORKSPACE/build" -j $(nproc)

    - name: Test
      run: ctest --output-on-failure --test-dir "$GITHUB_WORKSPACE/build"

  warray-bounds-canary-gcc16:
    # Canary that the [[assume(n <= sizeof(buffer))]] hint added in
    # include/glaze/json/read.hpp (short-string parse branch) keeps GCC 16's
    # -Warray-bounds quiet under the strict-warning + -Werror config reported
    # in PR #2571. If a future GCC revision ever drops the assume on the
    # floor or changes its VRP behavior, this job fails fast and the project
    # can fall back to a local `#pragma GCC diagnostic` suppression.
    runs-on: ubuntu-24.04
    container:
      image: gcc:16.1

    strategy:
      fail-fast: false
      matrix:
        opt: [-O2, -O3]
        std: [23, 26]

    steps:
    - uses: actions/checkout@v6

    - name: Compile short-string parse path with strict warnings
      run: |
        g++ --version
        cat > /tmp/canary.cpp <<'EOF'
        // Minimal driver that instantiates glz::from<JSON, std::string>::op,
        // which contains the short-string branch with the [[assume]] hint.
        // Strict warnings + -Werror reproduce the contributor's failing build.
        #include <glaze/json.hpp>
        #include <string>

        struct S { std::string s; };

        int main()
        {
           S s;
           auto ec = glz::read_json(s, R"({"s":"hi"})");
           return ec ? 1 : 0;
        }
        EOF
        g++ -std=c++${{matrix.std}} ${{matrix.opt}} \
            -Wall -Wextra -Wpedantic \
            -Warray-bounds=2 \
            -Wstringop-overread \
            -Wstringop-overflow=4 \
            -Werror \
            -I "$GITHUB_WORKSPACE/include" \
            /tmp/canary.cpp -o /tmp/canary
        /tmp/canary

  build-gcc16-reflection:
    # C++26 P2996 reflection coverage on GCC 16.1.
    # Replaces the standalone gcc-p2996-reflection.yml workflow which used
    # ubuntu:26.04 + apt-installed gcc-16; gcc:16.1 is the official image.
    runs-on: ubuntu-24.04
    container:
      image: gcc:16.1

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    env:
      CC: gcc
      CXX: g++

    steps:
    - name: Install build dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates \
          cmake \
          git \
          libssl-dev \
          python3
        update-ca-certificates

    - uses: actions/checkout@v6

    - name: Verify reflection support
      run: |
        g++ --version
        echo 'int main() { return 0; }' | g++ -std=c++26 -freflection -x c++ -c - -o /dev/null

    - name: Prepare build directory
      run: cmake -E make_directory "$GITHUB_WORKSPACE/build"

    - name: Configure CMake
      run: |
        cmake -S "$GITHUB_WORKSPACE" -B "$GITHUB_WORKSPACE/build" \
          -DCMAKE_BUILD_TYPE=${{matrix.build_type}} \
          -DCMAKE_CXX_FLAGS='-std=c++26 -freflection' \
          -Dglaze_DEVELOPER_MODE=ON \
          -Dglaze_ENABLE_REFLECTION26=ON \
          -Dglaze_BUILD_NETWORKING_TESTS=OFF \
          -Dglaze_ENABLE_SANITIZERS=OFF \
          -Dglaze_ENABLE_FUZZING=OFF

    - name: Build
      run: cmake --build "$GITHUB_WORKSPACE/build" -j $(nproc)

    - name: Test
      run: ctest --output-on-failure --test-dir "$GITHUB_WORKSPACE/build" -j $(nproc)
