name: msys2-mingw-ssl

on:
  push:
    branches:
      - main
      - feature/*
      - debug/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # Test 1: GLZ_ENABLE_SSL defined + OpenSSL linked (the crashing configuration)
  ssl-enabled:
    name: "SSL enabled (GLZ_ENABLE_SSL + OpenSSL)"
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl

    - name: Configure & Build
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON
        cmake --build build -j $(nproc) --target mingw_ssl_diag

    - name: "Run: mingw_ssl_diag (GLZ_ENABLE_SSL=ON)"
      working-directory: build
      run: ctest -C Release --output-on-failure -R "^mingw_ssl_diag$" || true

  # Test 2: OpenSSL DLLs linked but GLZ_ENABLE_SSL NOT defined
  # If this crashes → DLL loading is the cause
  # If this passes → the GLZ_ENABLE_SSL macro / template changes are the cause
  link-only:
    name: "Link-only (OpenSSL linked, NO GLZ_ENABLE_SSL)"
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl

    - name: Configure & Build
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON
        cmake --build build -j $(nproc) --target mingw_link_only_test

    - name: "Run: mingw_link_only_test (no GLZ_ENABLE_SSL macro)"
      working-directory: build
      run: ctest -C Release --output-on-failure -R "^mingw_link_only_test$" || true

  # Test 3: Static OpenSSL linking
  # If this passes → DLL boundary / CRT mismatch is the cause
  # If this crashes → the issue is deeper (OpenSSL code itself)
  static-ssl:
    name: "Static OpenSSL"
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v6
    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl

    - name: Configure & Build
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON \
          -DOPENSSL_USE_STATIC_LIBS=ON
        cmake --build build -j $(nproc) --target mingw_ssl_diag

    - name: "Run: mingw_ssl_diag (static OpenSSL)"
      working-directory: build
      run: ctest -C Release --output-on-failure -R "^mingw_ssl_diag$" || true
