name: msys2-mingw-ssl

on:
  push:
    branches:
      - main
      - feature/*
      - debug/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: MinGW64 + SSL
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-gdb

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-g" \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON

    - name: Build
      run: |
        cmake --build build -j $(nproc) --target \
          mingw_ssl_diag \
          http_client_test \
          websocket_client_test \
          websocket_close_test \
          wss_test \
          shared_context_bug_test \
          utf8_test \
          https_test

    # Configure WER crash dumps before running tests
    - name: Configure crash dumps (WER)
      shell: pwsh
      run: |
        $dumpPath = "D:\CrashDumps"
        New-Item -Path $dumpPath -ItemType Directory -Force | Out-Null
        $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
        New-Item -Path $regPath -Force | Out-Null
        Set-ItemProperty -Path $regPath -Name "DumpType" -Value 2 -Type DWord
        Set-ItemProperty -Path $regPath -Name "DumpFolder" -Value $dumpPath -Type ExpandString
        Set-ItemProperty -Path $regPath -Name "DumpCount" -Value 10 -Type DWord
        Write-Host "WER crash dumps configured at $dumpPath"

    # Run http_client_test directly (not via ctest) so stdout isn't buffered.
    # The ut framework prints test names as they run, so we'll see the last
    # successful test before the crash.
    - name: "Run http_client_test (direct)"
      working-directory: build
      run: |
        echo "Running http_client_test directly to capture last test before crash..."
        ./tests/networking_tests/http_client_test/http_client_test.exe 2>&1 || true

    - name: "Run mingw_ssl_diag"
      working-directory: build
      run: |
        ./tests/networking_tests/mingw_ssl_diag/mingw_ssl_diag.exe 2>&1 || true

    # Check for and analyze any crash dumps
    - name: Analyze crash dumps
      if: always()
      shell: pwsh
      run: |
        $dumps = Get-ChildItem -Path "D:\CrashDumps" -Filter "*.dmp" -ErrorAction SilentlyContinue
        if ($dumps) {
          Write-Host "=== Found $($dumps.Count) crash dump(s) ==="
          foreach ($dump in $dumps) {
            Write-Host "  $($dump.Name) — $('{0:N1}' -f ($dump.Length / 1MB)) MB"
          }
        } else {
          Write-Host "No crash dumps captured."
        }

    - name: GDB post-mortem
      if: always()
      run: |
        found=0
        for dump in /d/CrashDumps/*.dmp; do
          [ -f "$dump" ] || continue
          found=1
          echo ""
          echo "========================================="
          echo "=== Analyzing: $dump"
          echo "========================================="
          echo ""
          gdb -batch \
            -ex "target mini $dump" \
            -ex "echo === CRASHING THREAD ===\n" \
            -ex "bt" \
            -ex "echo \n=== ALL THREADS ===\n" \
            -ex "thread apply all bt" \
            -ex "echo \n=== REGISTERS ===\n" \
            -ex "info registers" \
            -ex "quit" \
            tests/networking_tests/http_client_test/http_client_test.exe \
            2>&1 || echo "(gdb analysis failed)"
        done

        if [ $found -eq 0 ]; then
          echo "No crash dumps to analyze."
        fi

    - name: Run remaining tests
      if: always()
      run: |
        ctest --output-on-failure -R \
          "^(websocket_client_test|websocket_close_test|wss_test|shared_context_bug_test|utf8_test|https_test)$"
