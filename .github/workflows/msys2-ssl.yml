name: msys2-mingw-ssl

on:
  push:
    branches:
      - main
      - feature/*
      - debug/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: MinGW64 + SSL
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-gdb

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-g" \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON

    - name: Build
      run: |
        cmake --build build -j $(nproc) --target \
          mingw_ssl_diag \
          http_client_test \
          websocket_client_test \
          websocket_close_test \
          wss_test \
          shared_context_bug_test \
          utf8_test \
          https_test

    # Configure Windows Error Reporting to create full crash dumps.
    # This is completely non-intrusive — WER only activates AFTER the crash,
    # so it doesn't affect timing or memory layout like GDB/Page Heap do.
    - name: Configure crash dumps (WER)
      shell: pwsh
      run: |
        $dumpPath = "D:\CrashDumps"
        New-Item -Path $dumpPath -ItemType Directory -Force | Out-Null
        $regPath = "HKLM:\SOFTWARE\Microsoft\Windows\Windows Error Reporting\LocalDumps"
        New-Item -Path $regPath -Force | Out-Null
        Set-ItemProperty -Path $regPath -Name "DumpType" -Value 2 -Type DWord          # 2 = Full dump
        Set-ItemProperty -Path $regPath -Name "DumpFolder" -Value $dumpPath -Type ExpandString
        Set-ItemProperty -Path $regPath -Name "DumpCount" -Value 10 -Type DWord
        Write-Host "WER crash dumps configured at $dumpPath"

    # Run the crashing test natively (no GDB, no Page Heap)
    - name: Run http_client_test (native)
      working-directory: build
      run: |
        echo "Running http_client_test natively to reproduce crash..."
        ctest --output-on-failure -R "^http_client_test$" || true

    - name: Run mingw_ssl_diag (native)
      working-directory: build
      run: |
        ctest --output-on-failure -R "^mingw_ssl_diag$" || true

    # Analyze any crash dumps that were created
    - name: Analyze crash dumps
      shell: pwsh
      run: |
        $dumps = Get-ChildItem -Path "D:\CrashDumps" -Filter "*.dmp" -ErrorAction SilentlyContinue
        if ($dumps) {
          Write-Host "=== Found $($dumps.Count) crash dump(s) ==="
          foreach ($dump in $dumps) {
            Write-Host ""
            Write-Host "=== Dump: $($dump.Name) ($('{0:N0}' -f ($dump.Length / 1MB)) MB) ==="
            Write-Host ""
          }
        } else {
          Write-Host "No crash dumps found — WER may not have triggered."
          Write-Host "Listing D:\CrashDumps contents:"
          Get-ChildItem -Path "D:\CrashDumps" -ErrorAction SilentlyContinue | Format-Table
        }

    - name: GDB post-mortem analysis
      if: always()
      run: |
        echo "=== Checking for crash dumps ==="
        ls -la /d/CrashDumps/ 2>/dev/null || echo "No dumps directory"

        for dump in /d/CrashDumps/*.dmp; do
          [ -f "$dump" ] || continue
          echo ""
          echo "=== Analyzing: $dump ==="
          echo ""
          # Load the dump in gdb for post-mortem analysis
          gdb -batch \
            -ex "target mini $dump" \
            -ex "echo === CRASHING THREAD BACKTRACE ===\n" \
            -ex "bt" \
            -ex "echo \n=== ALL THREADS ===\n" \
            -ex "thread apply all bt" \
            -ex "echo \n=== REGISTERS ===\n" \
            -ex "info registers" \
            -ex "quit" \
            tests/networking_tests/http_client_test/http_client_test.exe \
            2>&1 || echo "gdb analysis failed for $dump"
        done

    - name: Run remaining tests
      if: always()
      run: |
        ctest --output-on-failure -R \
          "^(websocket_client_test|websocket_close_test|wss_test|shared_context_bug_test|utf8_test|https_test)$"
