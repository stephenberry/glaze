name: msys2-mingw-ssl

on:
  push:
    branches:
      - main
      - feature/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: MinGW64 + SSL
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl
          mingw-w64-x86_64-gdb

    # Build Release with debug symbols so GDB backtraces show line numbers
    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-g" \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON

    - name: Build
      run: |
        cmake --build build -j $(nproc) --target \
          mingw_ssl_diag \
          http_client_test \
          websocket_client_test \
          websocket_close_test \
          wss_test \
          shared_context_bug_test \
          utf8_test \
          https_test

    # Run under GDB to get a backtrace on crash
    - name: "GDB: http_client_test"
      working-directory: build
      run: |
        echo "Running http_client_test under GDB to capture crash backtrace..."
        gdb -batch \
          -ex "set print thread-events off" \
          -ex "run" \
          -ex "echo \n=== CRASH BACKTRACE ===\n" \
          -ex "bt full" \
          -ex "echo \n=== ALL THREADS ===\n" \
          -ex "thread apply all bt" \
          -ex "quit" \
          --args tests/networking_tests/http_client_test/http_client_test.exe \
          2>&1 || true

    - name: "GDB: mingw_ssl_diag"
      working-directory: build
      run: |
        echo "Running mingw_ssl_diag under GDB..."
        gdb -batch \
          -ex "set print thread-events off" \
          -ex "run" \
          -ex "echo \n=== CRASH BACKTRACE ===\n" \
          -ex "bt full" \
          -ex "echo \n=== ALL THREADS ===\n" \
          -ex "thread apply all bt" \
          -ex "quit" \
          --args tests/networking_tests/mingw_ssl_diag/mingw_ssl_diag.exe \
          2>&1 || true

    - name: Run remaining tests
      working-directory: build
      run: |
        ctest --output-on-failure -R \
          "^(websocket_client_test|websocket_close_test|wss_test|shared_context_bug_test|utf8_test|https_test)$"
