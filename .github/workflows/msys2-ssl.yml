name: msys2-mingw-ssl

on:
  push:
    branches:
      - main
      - feature/*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    name: MinGW64 + SSL
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        update: true
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-openssl

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_STANDARD=23 \
          -Dglaze_ENABLE_SSL=ON

    - name: Build
      run: |
        cmake --build build -j $(nproc) --target \
          mingw_ssl_diag \
          http_client_test \
          websocket_client_test \
          websocket_close_test \
          wss_test \
          shared_context_bug_test \
          utf8_test \
          https_test

    # Run http_client_test in a loop — the heap corruption is intermittent.
    # The original crash took ~0.7s, so 20 iterations ≈ 14s.
    - name: "Repeat: http_client_test (20x)"
      working-directory: build
      run: |
        echo "Running http_client_test 20 times to reproduce intermittent heap corruption..."
        for i in $(seq 1 20); do
          echo "--- Run $i/20 ---"
          ctest --output-on-failure -R "^http_client_test$" || { echo "FAILED on run $i"; exit 1; }
        done
        echo "All 20 runs passed."

    # Same for the diagnostic stress tests
    - name: "Repeat: mingw_ssl_diag (20x)"
      working-directory: build
      run: |
        echo "Running mingw_ssl_diag 20 times..."
        for i in $(seq 1 20); do
          echo "--- Run $i/20 ---"
          ctest --output-on-failure -R "^mingw_ssl_diag$" || { echo "FAILED on run $i"; exit 1; }
        done
        echo "All 20 runs passed."

    - name: Run remaining tests
      working-directory: build
      run: |
        ctest --output-on-failure -R \
          "^(websocket_client_test|websocket_close_test|wss_test|shared_context_bug_test|utf8_test|https_test)$"
